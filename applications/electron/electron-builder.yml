appId: dev.zumito.studio
productName: ZumitoStudio
copyright: Copyright © 2026 Zumito
electronDist: ../../node_modules/electron/dist
electronVersion: 39.8.7
asar: true
asarUnpack:
  - "**/lib/backend/native/**"
  - "**/lib/backend/shell-integrations/**"
  - "**/lib/prebuilds/**"
nodeGypRebuild: false
npmRebuild: false

directories:
  buildResources: resources

# node_modules and package.json are copied automatically
# Exclude node_modules manually because electron is copied by electron-builder and we are using a bundled backend
files:
  - src-gen
  - lib
  - resources/icons/WindowIcon/512-512.png
  - resources/ZumitoSplash.svg
  - scripts
  - "!**node_modules/**"
extraResources:
  - from: ../../plugins
    to: app/plugins

win:
  icon: resources/icons/WindowsLauncherIcons/ZumitoStudio.ico
  target:
    - nsis
  publish:
    provider: generic
    url: "https://github.com/ZumitoTeam/zumito-studio/releases/download/${version}/windows"
    useMultipleRangeRequest: false
mac:
  icon: resources/icons/MacLauncherIcons/icon.icns
  category: public.app-category.developer-tools
  protocols:
    - name: zumito-studio
      schemes:
        - zumito-studio
  darkModeSupport: true
  target:
    - dmg
    - zip
  publish:
    provider: generic
    url: "https://github.com/ZumitoTeam/zumito-studio/releases/latest/download/macos"
linux:
  icon: resources/icons/LinuxLauncherIcons
  category: Development
  mimeTypes:
    - inode/directory
  vendor: Zumito
  target:
    - deb
    - AppImage
  publish:
    provider: generic
    url: "https://github.com/ZumitoTeam/zumito-studio/releases/latest/download/linux"

nsis:
  menuCategory: true
  oneClick: false
  perMachine: false
  installerHeaderIcon: resources/icons/WindowsLauncherIcons/ZumitoStudio.ico
  installerIcon: resources/icons/WindowsLauncherIcons/ZumitoStudio.ico
  uninstallerIcon: resources/icons/WindowsLauncherIcons/ZumitoStudio.ico
  installerSidebar: resources/icons/InstallerSidebarImage/164-314Windows.bmp
  uninstallerSidebar: resources/icons/InstallerSidebarImage/164-314Windows.bmp
  allowToChangeInstallationDirectory: true
  runAfterFinish: false
  artifactName: ${productName}Setup.${ext}
  license: LICENSE
dmg:
  artifactName: ${productName}.${ext}
deb:
  artifactName: ${productName}.${ext}
appImage:
  artifactName: ${productName}.${ext}

afterPack: ./scripts/after-pack.js
