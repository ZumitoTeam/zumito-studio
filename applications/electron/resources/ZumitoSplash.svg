<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   version="1.1"
   xmlns="http://www.w3.org/2000/svg"
   x="0px" y="0px"
   viewBox="0 0 446 276"
   width="446" height="276"
   xml:space="preserve">
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1e1e1e"/>
    <stop offset="100%" stop-color="#252526"/>
  </linearGradient>
  <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#e11d48"/>
    <stop offset="100%" stop-color="#f472b6"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="446" height="276" fill="url(#bgGrad)"/>

<!-- Title bar -->
<rect x="0" y="0" width="446" height="32" fill="#2d2d2d"/>
<circle cx="18" cy="16" r="5" fill="#ff5f57"/>
<circle cx="34" cy="16" r="5" fill="#febc2e"/>
<circle cx="50" cy="16" r="5" fill="#28c840"/>

<!-- Hexagon logo icon -->
<g transform="translate(223, 98)">
  <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15"
           fill="none" stroke="url(#barFill)" stroke-width="2.5"/>
  <text x="0" y="8"
        font-family="monospace"
        font-size="26" font-weight="700"
        fill="#e11d48" text-anchor="middle">Z</text>
</g>

<!-- Product name -->
<text x="223" y="166"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="24" font-weight="600"
      fill="#e0e0e0" text-anchor="middle"
      letter-spacing="2">Zumito</text>

<text x="223" y="190"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="15" font-weight="300"
      fill="#888888" text-anchor="middle"
      letter-spacing="6">STUDIO</text>

<!-- Version -->
<text x="223" y="212"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="10" font-weight="400"
      fill="#555555" text-anchor="middle"
      letter-spacing="1">v1.72.100</text>

<!-- Progress bar track -->
<rect x="53" y="236" width="340" height="4" rx="2" fill="#3c3c3c"/>

<!-- Progress bar fill (~35%) -->
<rect x="53" y="236" width="120" height="4" rx="2" fill="url(#barFill)"/>

<!-- Loading text -->
<text x="223" y="265"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="8" font-weight="400"
      fill="#555555" text-anchor="middle"
      letter-spacing="1">Loading modules...</text>

</svg>
