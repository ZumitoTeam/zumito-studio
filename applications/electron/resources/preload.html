<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        html,
        body {
            background-color: #1e1e1e;
            margin: 0;
        }

        .theia-preload {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: none;
        }

        .theia-preload::after {
            content: none;
        }

        .spinner-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .custom-spinner {
            animation-delay: 0;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-name: zumito-spinner;
            animation-timing-function: ease;
        }

        .custom-spinner svg {
            width: 80px;
            height: 80px;
        }

        .loading-text {
            color: #888;
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 24px;
        }

        @keyframes zumito-spinner {
            0% {
                opacity: 0.4;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.4;
                transform: scale(0.95);
            }
        }
    </style>
</head>

<body>
    <div class='spinner-container'>
        <div class='custom-spinner'>
            <svg version="1.1" xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 64 64" fill="none">
                <polygon points="32,2 58,17 58,47 32,62 6,47 6,17"
                         stroke="#e11d48" stroke-width="2" fill="none"/>
                <text x="32" y="39"
                      font-family="monospace" font-size="22" font-weight="700"
                      fill="#e11d48" text-anchor="middle">Z</text>
            </svg>
        </div>
        <div class="loading-text">Zumito Studio</div>
    </div>
</body>

</html>
